<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recruitment Sandbox</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#141414" />
  </head>
  <body>
    <div id="root">
      <div style="min-height: 100vh; background-color: #F9F7F2; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; border: 8px solid #1A1A1A;">
        <div style="font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px;">Recruitment Sandbox</div>
        <div style="width: 40px; height: 40px; border: 4px solid #1A1A1A; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <style>
          @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
